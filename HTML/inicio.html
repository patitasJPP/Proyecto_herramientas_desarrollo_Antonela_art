<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Salón de Belleza</title>
    <link rel="stylesheet" href="../CSS/inicio.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="logo">✨</div>
      <nav>
        <a href="#">Servicios</a>
        <a href="#">Productos</a>
      </nav>
      <button class="btn">Reservar Cita</button>
    </header>

    <section class="hero">
      <div class="hero-text">
        <h1>Belleza que Inspira Confianza</h1>
        <p>
          Descubre nuestros servicios de alta gama para realzar tu belleza
          natural.
        </p>
        <button class="btn">Reservar Cita</button>
        <button class="btn-outline">Ver Servicios</button>
      </div>
      <img
        src="https://images.unsplash.com/photo-1585747860715-2ba37e788b70"
        alt=""
      />
    </section>

    <section class="servicios">
      <h2>Nuestros Servicios</h2>
      <div class="grid">
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9"
          />
          <p>Planchado</p>
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1583001931096-959e9a1a6223"
          />
          <p>Laminado de cejas</p>
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1519415943484-9fa1873496d4"
          />
          <p>Pedicure</p>
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1604654894610-df63bc536371"
          />
          <p>Uñas Acrílicas</p>
        </div>

        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1581091215367-59ab6b6b2a1d"
          />
          <p>Rubor</p>
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1600948836101-f9ffda59d250"
          />
          <p>Trenzado</p>
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1596464716127-f2a82984de30"
          />
          <p>Corte</p>
        </div>
        <div class="card">
          <img
            src="https://images.unsplash.com/photo-1600334129128-685c5582fd35"
          />
          <p>Lifting</p>
        </div>
      </div>
    </section>

    <section class="trabajos">
      <h2>Nuestros Trabajos</h2>
      <div class="galeria">
        <img
          src="https://images.unsplash.com/photo-1616394584738-fc6e612e71b9"
        />
        <img
          src="https://images.unsplash.com/photo-1580618672591-eb180b1a973f"
        />
        <img
          src="https://images.unsplash.com/photo-1600948836101-f9ffda59d250"
        />
        <img
          src="https://images.unsplash.com/photo-1519415943484-9fa1873496d4"
        />
      </div>
    </section>

    <script src="../js/servicios.js"></script>
  </body>
</html>

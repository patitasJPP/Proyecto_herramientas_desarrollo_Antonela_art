<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Antonela Art – Crear Cuenta</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../CSS/registro.css" />
  </head>
  <body>
    <!-- LEFT: Imagen con overlay -->
    <div class="left-panel">
      <div class="overlay"></div>
      <div class="brand-info">
        <h2>Antonela Art</h2>
        <p>
          Embárquese en una experiencia de belleza excepcional. Cada detalle ha
          sido diseñado para su máximo confort y estilo.
        </p>
        <div class="dots">
          <span class="active"></span><span></span><span></span>
        </div>
      </div>
    </div>

    <!-- RIGHT: Formulario -->
    <div class="right-panel">
      <div class="register-box">
        <p class="eyebrow">BIENVENIDA AL ATELIER</p>
        <h1>Crea tu cuenta</h1>
        <p class="subtitle">
          Comience su viaje hacia una belleza renovada hoy mismo.
        </p>

        <div class="error-msg" id="errorMsg"></div>
        <div class="success-msg" id="successMsg"></div>

        <!-- Nombre + Apellido -->
        <div class="form-row-2">
          <div class="form-group">
            <label for="nombre">Nombre</label>
            <input type="text" id="nombre" placeholder="Ej. Ana" />
          </div>
          <div class="form-group">
            <label for="apellido">Apellido</label>
            <input type="text" id="apellido" placeholder="Ej. García" />
          </div>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">Correo Electrónico</label>
          <input type="email" id="email" placeholder="ana.garcia@ejemplo.com" />
        </div>

        <!-- Teléfono -->
        <div class="form-group">
          <label for="telefono">Teléfono</label>
          <input type="tel" id="telefono" placeholder="+51 000 000 000" />
        </div>

        <!-- Contraseña + Confirmar -->
        <div class="form-row-2">
          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
              <input type="password" id="password" placeholder="••••••••" />
              <span class="input-icon" id="togglePwd">
                <svg
                  id="eyeIcon1"
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
          </div>
          <div class="form-group">
            <label for="confirm">Confirmar</label>
            <div class="input-wrapper">
              <input type="password" id="confirm" placeholder="••••••••" />
              <span class="input-icon" id="toggleConfirm">
                <svg
                  id="eyeIcon2"
                  width="15"
                  height="15"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="1.8"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </span>
            </div>
          </div>
        </div>

        <!-- Términos -->
        <div class="terms-row">
          <input type="checkbox" id="terms" />
          <label class="checkbox-label" for="terms">
            <span class="custom-checkbox"></span>
            Acepto los términos de servicio y la política de privacidad.
          </label>
        </div>

        <!-- Botón -->
        <button
          class="btn-register"
          id="registerBtn"
          onclick="handleRegister()"
        >
          <span class="spinner"></span>
          <span class="btn-text">CREAR CUENTA</span>
        </button>

        <!-- Login link -->
        <div class="login-row">
          ¿Ya tengo una cuenta? <a href="./login.html">Iniciar sesión</a>
        </div>
      </div>
    </div>

    <script src="../js/registro.js"></script>
  </body>
</html>
